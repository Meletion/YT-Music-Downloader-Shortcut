name: Release

on:
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build Windows
        run: GOOS=windows GOARCH=amd64 go build -o YDMS-Windows.exe YMDS.go

      - name: Build Linux
        run: GOOS=linux GOARCH=amd64 go build -o YDMS-Linux YMDS.go

      - name: Build MacOS (Intel)
        run: GOOS=darwin GOARCH=amd64 go build -o YDMS-MacOS-Intel YMDS.go

      - name: Build MacOS (Apple Silicon)
        run: GOOS=darwin GOARCH=arm64 go build -o YDMS-MacOS-AppleSilicon YMDS.go

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            YDMS-Windows.exe
            YDMS-Linux
            YDMS-MacOS-Intel
            YDMS-MacOS-AppleSilicon
            YDMS-Userscript.js
